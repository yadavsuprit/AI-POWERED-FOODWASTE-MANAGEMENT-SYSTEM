<!DOCTYPE html>
<html>
<head>
<title>NGO Requests | FWMS</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#0f172a;
color:white;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.accept{
background:#22c55e;
color:white;
}

.reject{
background:#ef4444;
color:white;
}

</style>
</head>

<body>

<h2>NGO Food Requests</h2>

<table>

<tr>
<th>NGO Name</th>
<th>Food Required</th>
<th>Quantity</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>Helping Hands NGO</td>
<td>Cooked Food</td>
<td>40kg</td>
<td>Pending</td>
<td>
<button class="accept">Accept</button>
<button class="reject">Reject</button>
</td>
</tr>

<tr>
<td>Food For All</td>
<td>Packaged Food</td>
<td>20kg</td>
<td>Approved</td>
<td>-</td>
</tr>

</table>

</body>
</html>
