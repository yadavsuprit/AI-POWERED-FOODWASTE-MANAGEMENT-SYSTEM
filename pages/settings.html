<!DOCTYPE html>
<html>
<head>

<title>Settings | FWMS</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:500px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
padding:10px;
border:none;
border-radius:6px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Settings</h2>

<input type="text" placeholder="Admin Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="New Password">

<button>Update Settings</button>

</div>

</body>
</html>
